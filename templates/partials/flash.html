<!-- Reusable flash message partial used on public and admin pages -->
{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <!-- aria-live helps screen readers announce feedback messages -->
        <section class="flash-wrap container" aria-live="polite">
            {% for category, message in messages %}
                <!-- Category controls styling, for example flash-success or flash-error -->
                <div class="flash flash-{{ category }}">
                    <span>{{ message }}</span>

                    <!-- app.js lets the user close this message without a page reload -->
                    <button type="button" class="flash-close" aria-label="Close message">×</button>
                </div>
            {% endfor %}
        </section>
    {% endif %}
{% endwith %}
